services:
  web:
    container_name: arrislink-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3200:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
